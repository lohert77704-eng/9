<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій сайт-візитка</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
            color: #333;
            text-align: center;
        }

        header {
            background: #222;
            color: white;
            padding: 20px;
        }

        section {
            padding: 40px;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 20px auto;
            max-width: 500px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        a {
            color: #007bff;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>Привіт, я Артем 👋</h1>
        <p>Це мій сайт-візитка</p>
    </header>

    <section>
        <div class="card">
            <h2>Про мене</h2>
            <p>Я створюю сайти та навчаюсь веб-розробці.</p>
        </div>

        <div class="card">
            <h2>Контакти</h2>
            <p>Email: example@gmail.com</p>
            <p>Instagram: <a href="#">@myprofile</a></p>
        </div>
    </section>

</body>
</html>
